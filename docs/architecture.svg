<svg width="1120" viewBox="0 0 1120 736" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <style>
    .t{font-size:14px;fill:#1d2433}.ts{font-size:12px;fill:#69707f}.th{font-size:14px;font-weight:500;fill:#1d2433}
    .arr{stroke:#888780;stroke-width:1.5;fill:none}.ctl{stroke:#7F77DD;stroke-width:1.4;fill:none;stroke-dasharray:5 4}
    .ghost{stroke:#888780;stroke-width:1.3;fill:none;stroke-dasharray:5 4}
