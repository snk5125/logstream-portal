    <g><rect x="70" y="422" width="118" height="70" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text x="129" y="450" class="t" fill="#085041" text-anchor="middle">Cribl leader</text><text x="129" y="465" class="ts" text-anchor="middle">API :9000</text><text x="129" y="479" class="ts" text-anchor="middle">enroll :4200</text></g>
    <g><rect x="196" y="422" width="118" height="70" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text x="255" y="450" class="t" fill="#085041" text-anchor="middle">Cribl worker</text><text x="255" y="465" class="ts" text-anchor="middle">default group</text><text x="255" y="479" class="ts" text-anchor="middle">ingest :10300</text></g>
