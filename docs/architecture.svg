    <g><rect x="56" y="334" width="150" height="46" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text x="131" y="354" class="t" fill="#444441" text-anchor="middle">ALB</text><text x="131" y="369" class="ts" text-anchor="middle">operator-IP only</text></g>
