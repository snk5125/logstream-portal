    <g><rect x="56" y="164" width="258" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text x="185" y="185" class="t" fill="#085041" text-anchor="middle">Cribl Edge — EC2 · managed</text><text x="185" y="200" class="ts" text-anchor="middle">storefront_web · orders_api · → default_fleet</text></g>
    <g><rect x="56" y="224" width="258" height="38" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text x="185" y="247" class="t" fill="#444441" text-anchor="middle">Interface VPC endpoint</text></g>

    <rect x="350" y="118" width="290" height="152" rx="8" fill="none" stroke="#888780" stroke-width="1.3"/>
    <text x="364" y="138" class="th">Workload Account B · 624627265315</text><text x="364" y="154" class="ts">prod-platform</text>
    <g><rect x="366" y="164" width="258" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56"/><text x="495" y="185" class="t" fill="#085041" text-anchor="middle">Cribl Edge — EC2</text><text x="495" y="200" class="ts" text-anchor="middle">identity_svc · batch_etl · tag</text></g>
    <g><rect x="366" y="224" width="258" height="38" rx="6" fill="#F1EFE8" stroke="#5F5E5A"/><text x="495" y="247" class="t" fill="#444441" text-anchor="middle">Interface VPC endpoint</text></g>

